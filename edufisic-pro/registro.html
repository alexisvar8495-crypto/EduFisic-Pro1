<!-- Correo Electrónico -->

<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-electric-blue transition-colors" data-icon="mail">mail</span>

<script>
        function togglePassword(id) {
            const field = document.getElementById(id);
            const btn = event.currentTarget.querySelector('span');
            if (field.type === 'password') {
                field.type = 'text';
                btn.textContent = 'visibility_off';
            } else {
                field.type = 'password';
                btn.textContent = 'visibility';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach((input, index) => {
                input.style.opacity = '0';
                input.style.transform = 'translateX(-10px)';
                setTimeout(() => {
                    input.style.transition = 'all 0.4s ease-out';
                    input.style.opacity = '1';
                    input.style.transform = 'translateX(0)';
                }, 400 + (index * 100));
            });
        });
    </script>
