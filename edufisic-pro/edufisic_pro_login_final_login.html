<!-- Interactive Layer: Ambient Light Effect -->
<div class="fixed pointer-events-none w-[500px] h-[500px] rounded-full opacity-10 bg-electric-blue blur-[100px] z-0 -translate-x-1/2 -translate-y-1/2 transition-transform duration-75 ease-out hidden md:block" id="cursor-glow"></div>
<script>
        // Track mouse for ambient light effect
        const glow = document.getElementById('cursor-glow');
        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // Simple input animation feedback
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.previousElementSibling?.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.previousElementSibling?.classList.remove('text-primary');
            });
        });
    </script>
